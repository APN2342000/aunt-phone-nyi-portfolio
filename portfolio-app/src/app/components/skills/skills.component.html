<section id="skills" class="skills">
  <div class="section-shell">
    <p class="pcb-label" appReveal>U3 — Skills</p>
    <h2 class="skills__heading" [appReveal]="80">The stack on the board</h2>

    <div class="skills__grid">
      <article class="skills__chip" *ngFor="let group of groups; let i = index" [appReveal]="120 + i * 100">
        <div class="skills__chip-head">
          <span class="skills__part">{{ group.partNumber }}</span>
          <span class="skills__category">{{ group.category }}</span>
        </div>
        <div class="skills__pins">
          <span class="skills__pin" *ngFor="let item of group.items">{{ item }}</span>
        </div>
      </article>
    </div>
  </div>
</section>
